<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>BBB Yeni Sistem Simülasyonu</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 0; background: #f0f4f8; display: flex; height: 100vh; }
        
        /* Sol Menü (Eklenti burayı GÖRMEMELİ) */
        .left-menu { width: 250px; background: white; border-right: 1px solid #ccc; padding: 15px; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .left-menu h4 { color: #333; margin-bottom: 5px; }
        .old-btn { display: block; width: 100%; margin: 5px 0; padding: 8px; background: #e9ecef; border: 1px solid #ccc; text-align: left; color: #555; }

        /* Ana İçerik */
        .main-content { flex: 1; padding: 40px; }
        .btn-teacher { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #d9534f; color: white; border: none; border-radius: 5px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }

        /* Sağ Alttaki Aktif Anket (Eklenti burayı YAKALAMALI) */
        .active-poll {
            position: fixed; bottom: 20px; right: 20px;
            width: 320px; background: white; border: 1px solid #0056b3;
            padding: 15px; border-radius: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .poll-title { font-weight: bold; font-size: 14px; margin-bottom: 10px; color: #333; }
        .poll-option { display: block; width: 100%; margin: 8px 0; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-align: left; }
        .poll-option:hover { background: #0056b3; }
        
        /* Eklentinin aradığı sihirli yazı */
        .poll-warning { font-size: 11px; color: #666; margin-top: 15px; display: block; }
    </style>
</head>
<body>

    <div class="left-menu">
        <h4>Oylama sorusu</h4>
        <p style="font-size: 12px; color: #666;">Geçmiş bir sorunun metni burada yazıyor...</p>
        <button class="old-btn">1: 6 || 13%</button>
        <button class="old-btn">2: 36 || 77%</button>
    </div>

    <div class="main-content">
        <h1>Eklenti Zeka Testi</h1>
        <p>Eklenti sol menüdeki "Oylama sorusu" yazısına ve butonlara aldanmayacak. Kırmızı butona bastığında sağ altta açılacak olan GERÇEK kutuya odaklanacak.</p>
        
        <button class="btn-teacher" onclick="triggerPoll()">Hoca Anketi Başlat (Sağ Altta Açılır)</button>
    </div>

    <script>
        function triggerPoll() {
            // Varsa eski kutuyu temizle
            const oldPoll = document.querySelector('.active-poll');
            if (oldPoll) oldPoll.remove();

            // Yeni aktif anket kutusu oluştur (BBB Mantığı)
            const pollBox = document.createElement('div');
            pollBox.className = 'active-poll';
            pollBox.innerHTML = `
                <div class="poll-title">Oylama sorusu</div>
                <p style="font-size: 13px; margin-bottom: 15px;">You have 10 pigeons and 9 holes. What does...</p>
                
                <button class="poll-option" onclick="alert('Tebrikler! Eklenti A şıkkını seçti.')">Every hole contains exactly 1 pigeon</button>
                <button class="poll-option" onclick="alert('Tebrikler! Eklenti B şıkkını seçti.')">At least one hole contains at least 2 pigeons</button>
                <button class="poll-option" onclick="alert('Tebrikler! Eklenti C şıkkını seçti.')">At most one hole contains 2 pigeons</button>
                
                <button aria-label="Close" style="display: none;">Kapat</button>

                <span class="poll-warning">Normal oylama. Sunucu yanıtınızı görebilir.</span>
            `;

            document.body.appendChild(pollBox);
            console.log("Yeni anket kutusu DOM'a eklendi.");
        }
    </script>

</body>
</html>
